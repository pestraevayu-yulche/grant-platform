{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Регистрация заявителя</h2>
        <p class="auth-subtitle">Заполните форму для участия в грантовых конкурсах</p>

        {% if error %}
        <div class="alert alert-error">
            <span class="alert-icon">⚠️</span>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>ФИО полностью <span class="required">*</span></label>
                <input type="text" name="full_name" placeholder="Иванов Иван Иванович" required>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" placeholder="ivanov@example.com" required>
            </div>

            <div class="form-group">
                <label>Логин <span class="required">*</span></label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
                <small class="form-hint">Только латинские буквы и цифры</small>
            </div>

            <div class="form-group">
                <label>Пароль <span class="required">*</span></label>
                <input type="password" name="password" placeholder="Придумайте пароль" required>
                <small class="form-hint">Минимум 6 символов</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>

        <div class="auth-links">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
</div>
{% endblock %}
