<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Вконкурсе</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #cbd5e1;
        }

        .register-container:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 500;
            color: #1e3c72;
            letter-spacing: -0.3px;
        }

        .logo p {
            color: #6c757d;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 2px rgba(30, 60, 114, 0.1);
            background: #ffffff;
        }

        .btn {
            width: 100%;
            background: #1e3c72;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #152c55;
            transform: translateY(-1px);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6c757d;
        }

        .login-link a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">
            <h1>Регистрация</h1>
            <p>Создайте аккаунт для работы с системой</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">ФИО</label>
                <input type="text" id="fullname" placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ivanov@example.com">
            </div>
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <input type="password" id="confirm_password" placeholder="Повторите пароль" required>
            </div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }

            if (username.length < 3) {
                alert('Логин должен содержать не менее 3 символов');
                return;
            }

            if (password.length < 4) {
                alert('Пароль должен содержать не менее 4 символов');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        fullname: document.getElementById('fullname').value,
                        email: document.getElementById('email').value
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('Регистрация успешна! Теперь вы можете войти.');
                    window.location.href = '/login';
                } else {
                    alert(data.error || 'Ошибка регистрации');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка соединения');
            }
        });
    </script>
</body>

</html>
